<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nobase — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #F36DD4;
      --teal: #2DD4BF;
      --dark: #0f0f0f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: #faf5fc;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #fff0fb 0%, #f0fffe 100%);
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(243,109,212,0.12);
      text-align: center;
    }

    .login-logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      color: var(--dark);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .login-logo span { color: var(--pink); }

    .login-sub {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 36px;
    }

    .login-card label {
      display: block;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .login-card input[type="password"] {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #f0e6f8;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Nunito Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
      background: #fdf8ff;
    }

    .login-card input[type="password"]:focus {
      border-color: var(--pink);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--pink), #c94fb8);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }

    .login-error {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #e05c5c;
      display: none;
    }

    /* ── DASHBOARD ── */
    #dashboard-screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    .admin-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: #fff;
      border-bottom: 1px solid #f0e6f8;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .admin-brand {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--dark);
    }

    .admin-brand span { color: var(--pink); }

    .admin-badge {
      font-size: 0.72rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--pink), var(--teal));
      color: #fff;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .logout-btn {
      background: none;
      border: 2px solid #f0e6f8;
      color: #888;
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Nunito Sans', sans-serif;
    }

    .logout-btn:hover { border-color: var(--pink); color: var(--pink); }

    .dashboard-body {
      flex: 1;
      padding: 24px 32px;
    }

    .dashboard-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--dark);
      margin-bottom: 16px;
    }

    .dashboard-title span {
      font-size: 0.8rem;
      font-weight: 600;
      color: #aaa;
      margin-left: 10px;
    }

    .report-frame {
      width: 100%;
      height: calc(100vh - 140px);
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      background: #fff;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">no<span>base</span></div>
      <p class="login-sub">Espace administrateur</p>
      <label for="pwd">Mot de passe</label>
      <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkLogin()">
      <button class="login-btn" onclick="checkLogin()">Accéder au dashboard</button>
      <p class="login-error" id="error-msg">Mot de passe incorrect.</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-screen">
    <nav class="admin-nav">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="admin-brand">no<span>base</span></div>
        <span class="admin-badge">Admin</span>
      </div>
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </nav>
    <div class="dashboard-body">
      <div class="dashboard-title">
        Analytics — nobasedesign.com
        <span>données mises à jour en continu</span>
      </div>
      <iframe
        class="report-frame"
        src="https://lookerstudio.google.com/embed/reporting/b3202744-ced0-4f1c-bc4f-4594205904ba/page/5SYtF"
        allowfullscreen
        sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox">
      </iframe>
    </div>
  </div>

  <script>
    function verifyToken(token) {
      if (!token) return false;
      const parts = token.split('.');
      if (parts.length !== 2) return false;
      const [payload] = parts;
      const [, expiry] = payload.split(':');
      return Date.now() < parseInt(expiry, 10);
    }

    async function checkLogin() {
      const val = document.getElementById('pwd').value.trim();
      const err = document.getElementById('error-msg');
      const btn = document.querySelector('.login-btn');

      if (!val) return;
      btn.disabled = true;
      btn.textContent = 'Vérification…';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/admin-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: val }),
        });

        const data = await res.json();

        if (res.ok && data.token) {
          sessionStorage.setItem('nb_admin_token', data.token);
          showDashboard();
        } else {
          err.textContent = data.error || 'Mot de passe incorrect.';
          err.style.display = 'block';
          document.getElementById('pwd').value = '';
          document.getElementById('pwd').focus();
        }
      } catch {
        err.textContent = 'Erreur réseau, réessayez.';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Accéder au dashboard';
      }
    }

    function showDashboard() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'flex';
    }

    function logout() {
      sessionStorage.removeItem('nb_admin_token');
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard-screen').style.display = 'none';
      document.getElementById('pwd').value = '';
    }

    // Auto-login si token valide en session
    const existingToken = sessionStorage.getItem('nb_admin_token');
    if (verifyToken(existingToken)) showDashboard();
  </script>

</body>
</html>
